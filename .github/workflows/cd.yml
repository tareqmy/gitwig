name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Draft Release
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release already exists"
          else
            gh release create "${{ github.ref_name }}" --draft --title "${{ github.ref_name }}" --notes "Release version ${{ github.ref_name }}" --repo "${{ github.repository }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: Upload Assets - ${{ matrix.target }}
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install libgit2 dependency (Ubuntu only)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y libgit2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../gitwig-${{ github.ref_name }}-${{ matrix.target }}.tar.gz gitwig

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../gitwig-${{ github.ref_name }}-${{ matrix.target }}.zip gitwig.exe

      - name: Upload Asset to Draft Release
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            gh release upload "${{ github.ref_name }}" "gitwig-${{ github.ref_name }}-${{ matrix.target }}.zip" --clobber --repo "${{ github.repository }}"
          else
            gh release upload "${{ github.ref_name }}" "gitwig-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" --clobber --repo "${{ github.repository }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
