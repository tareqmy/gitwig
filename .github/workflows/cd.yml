name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Draft Release
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release already exists"
          else
            gh release create "${{ github.ref_name }}" --draft --title "${{ github.ref_name }}" --notes "Release version ${{ github.ref_name }}" --repo "${{ github.repository }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    name: Upload Assets - ${{ matrix.target }}
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install musl-tools (musl target only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../gitwig-${{ github.ref_name }}-${{ matrix.target }}.tar.gz gitwig

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../gitwig-${{ github.ref_name }}-${{ matrix.target }}.zip gitwig.exe

      - name: Locate and copy MSVC runtime merge module (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msm = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Filter "Microsoft_VC14*_CRT_x64.msm" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msm) {
              Write-Host "Merge module not found. Installing VC++ Redistributable MSM component..."
              Start-Process -FilePath "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe" -ArgumentList "modify --installPath `"C:\Program Files\Microsoft Visual Studio\2022\Enterprise`" --add Microsoft.VisualStudio.Component.VC.Redist.MSM --quiet --norestart --nocache" -Wait -PassThru
              $msm = Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Filter "Microsoft_VC14*_CRT_x64.msm" -Recurse | Select-Object -First 1
          }
          if ($msm) {
              Write-Host "Found merge module: $($msm.FullName)"
              New-Item -ItemType Directory -Path "wix" -Force
              Copy-Item $msm.FullName -Destination "wix/Microsoft_VC142_CRT_x64.msm" -Force
          } else {
              Write-Error "Could not locate MSVC runtime merge module."
              exit 1
          }

      - name: Install cargo-binstall & cargo-wix (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1'))
          cargo binstall --no-confirm cargo-wix

      - name: Build MSI Installer (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "target/release" -Force
          Copy-Item "target/x86_64-pc-windows-msvc/release/gitwig.exe" -Destination "target/release/gitwig.exe" -Force
          cargo wix --no-build -p gitwig

      - name: Upload Asset to Draft Release
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            gh release upload "${{ github.ref_name }}" "gitwig-${{ github.ref_name }}-${{ matrix.target }}.zip" --clobber --repo "${{ github.repository }}"
            gh release upload "${{ github.ref_name }}" target/wix/*.msi --clobber --repo "${{ github.repository }}"
          else
            gh release upload "${{ github.ref_name }}" "gitwig-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" --clobber --repo "${{ github.repository }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub Release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-cargo:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check Token Presence
        id: check-token
        run: |
          if [ -z "${{ secrets.CARGO_REGISTRY_TOKEN }}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN secret is not set. Skipping Crates.io publication."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Install libgit2 dependency
        if: steps.check-token.outputs.skip == 'false'
        run: sudo apt-get update && sudo apt-get install -y libgit2-dev
      - name: Install Rust toolchain
        if: steps.check-token.outputs.skip == 'false'
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo Publish
        if: steps.check-token.outputs.skip == 'false'
        run: |
          cargo publish -p gitwig-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
          echo "Waiting 15 seconds for crates.io index to update..."
          sleep 15
          cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  publish-homebrew:
    name: Publish to Homebrew Tap
    needs: publish-release
    runs-on: ubuntu-latest
    steps:
      - name: Calculate Hash and Update Formula
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          
          # Clone the tap repository manually using the token
          git clone "https://x-access-token:${{ secrets.TAP_GITHUB_TOKEN }}@github.com/tareqmy/homebrew-gitwig.git" homebrew-gitwig || {
            echo "Clone failed (possibly empty repository). Initializing new local repository..."
            mkdir homebrew-gitwig
            cd homebrew-gitwig
            git init
            git checkout -b main
            git remote add origin "https://x-access-token:${{ secrets.TAP_GITHUB_TOKEN }}@github.com/tareqmy/homebrew-gitwig.git"
            cd ..
          }
          
          # Fetch files to calculate sha256 checksums
          curl -LO "https://github.com/tareqmy/gitwig/releases/download/${VERSION}/gitwig-${VERSION}-x86_64-apple-darwin.tar.gz"
          curl -LO "https://github.com/tareqmy/gitwig/releases/download/${VERSION}/gitwig-${VERSION}-aarch64-apple-darwin.tar.gz"
          curl -LO "https://github.com/tareqmy/gitwig/releases/download/${VERSION}/gitwig-${VERSION}-x86_64-unknown-linux-musl.tar.gz"
          
          INTEL_SHA=$(sha256sum gitwig-${VERSION}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          ARM_SHA=$(sha256sum gitwig-${VERSION}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          LINUX_SHA=$(sha256sum gitwig-${VERSION}-x86_64-unknown-linux-musl.tar.gz | cut -d' ' -f1)
          
          mkdir -p homebrew-gitwig/Formula
          
          # Re-write the formula with new versions and hashes
          cat <<EOF > homebrew-gitwig/Formula/gitwig.rb
          class Gitwig < Formula
            desc "Rust-based Terminal User Interface (TUI) for Git"
            homepage "https://github.com/tareqmy/gitwig"
            version "${VERSION_NUM}"

            if OS.mac?
              if Hardware::CPU.intel?
                url "https://github.com/tareqmy/gitwig/releases/download/v#{version}/gitwig-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${INTEL_SHA}"
              elsif Hardware::CPU.arm?
                url "https://github.com/tareqmy/gitwig/releases/download/v#{version}/gitwig-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              end
            elsif OS.linux?
              if Hardware::CPU.intel?
                url "https://github.com/tareqmy/gitwig/releases/download/v#{version}/gitwig-v#{version}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${LINUX_SHA}"
              end
            end

            def install
              bin.install "gitwig"
            end

            test do
              assert_match "gitwig", shell_output("#{bin}/gitwig --version")
            end
          end
          EOF
          
          cd homebrew-gitwig
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/gitwig.rb
          git commit -m "Update gitwig to ${VERSION}" || echo "No changes to commit"
          git push origin main || git push origin master || echo "No changes to push"
